<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shower Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --foam: #eff9f8;
    --foam-2: #e2f3f1;
    --deep: #0e3b3e;
    --ink: #123b3d;
    --aqua: #4fb3bf;
    --aqua-dark: #37909b;
    --soap: #ffd966;
    --soap-shadow: #e8b84b;
    --bubble: #cdeeeb;
    --mint: #7fd8be;
    --white: #ffffff;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    padding:0;
    background: var(--foam);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    overflow-x:hidden;
  }

  h1, h2, h3, .display{
    font-family: 'Baloo 2', sans-serif;
  }

  a{ color: inherit; }

  .bubble-field{
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .bg-bubble{
    position:absolute;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.85), rgba(207,238,235,0.35) 60%, transparent 75%);
    opacity:0.55;
    animation: drift linear infinite;
  }
  @keyframes drift{
    0%{ transform: translateY(0) translateX(0); }
    50%{ transform: translateY(-30px) translateX(12px); }
    100%{ transform: translateY(0) translateX(0); }
  }

  main{
    position: relative;
    z-index: 1;
    max-width: 920px;
    margin: 0 auto;
    padding: 56px 24px 40px;
  }

  .hero{
    text-align:center;
    padding-bottom: 8px;
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-weight: 800;
    font-size: 0.78rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--aqua-dark);
    background: var(--white);
    border: 2px solid var(--bubble);
    padding: 6px 14px;
    border-radius: 999px;
  }
  .eyebrow .dot{
    width:7px; height:7px; border-radius:50%;
    background: var(--soap);
    display:inline-block;
  }
  h1.title{
    font-size: clamp(2.6rem, 6vw, 4.2rem);
    font-weight: 800;
    color: var(--deep);
    margin: 18px 0 10px;
    line-height: 1.02;
  }
  h1.title .accent{
    color: var(--aqua-dark);
  }
  .subtitle{
    max-width: 520px;
    margin: 0 auto;
    font-size: 1.08rem;
    font-weight: 600;
    color: #3c6265;
    line-height: 1.5;
  }

  .illustration-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 12px;
    margin: 28px 0 8px;
  }
  .illustration-row svg{
    filter: drop-shadow(0 10px 18px rgba(14,59,62,0.12));
  }
  .shower-graphic{ width: 150px; height: auto; }
  .soap-graphic{ width: 118px; height: auto; }

  .droplet{
    animation: fall 1.8s ease-in infinite;
    opacity: 0;
  }
  .droplet.d1{ animation-delay: 0s; }
  .droplet.d2{ animation-delay: 0.5s; }
  .droplet.d3{ animation-delay: 1s; }
  @keyframes fall{
    0%{ transform: translateY(0); opacity:0; }
    15%{ opacity: 1; }
    85%{ opacity: 1; }
    100%{ transform: translateY(22px); opacity:0; }
  }

  .suds{
    animation: rise 3.2s ease-in-out infinite;
  }
  @keyframes rise{
    0%, 100%{ transform: translateY(0); }
    50%{ transform: translateY(-6px); }
  }

  .scan-panel{
    text-align:center;
    margin: 30px 0 8px;
  }
  .scan-btn{
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 1.15rem;
    color: var(--deep);
    background: var(--soap);
    border: none;
    border-radius: 18px;
    padding: 16px 38px;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--soap-shadow), 0 14px 24px rgba(232,184,75,0.35);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .scan-btn:hover{ transform: translateY(-2px); }
  .scan-btn:active{
    transform: translateY(3px);
    box-shadow: 0 3px 0 var(--soap-shadow), 0 8px 16px rgba(232,184,75,0.3);
  }
  .scan-btn:focus-visible{
    outline: 3px solid var(--aqua-dark);
    outline-offset: 3px;
  }

  .status{
    margin-top: 16px;
    min-height: 24px;
    font-weight: 700;
    color: var(--aqua-dark);
    font-size:
